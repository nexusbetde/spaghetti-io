<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cover Portrait 800x1200</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; }
.cover {
  width: 800px;
  height: 1200px;
  background: linear-gradient(180deg, #1a0a05 0%, #2d1810 50%, #3d2015 100%);
  position: relative;
  overflow: hidden;
  font-family: 'Arial Black', sans-serif;
}

.checkerboard {
  position: absolute;
  inset: 0;
  opacity: 0.08;
  background-image:
    linear-gradient(45deg, #c41e3a 25%, transparent 25%),
    linear-gradient(-45deg, #c41e3a 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #c41e3a 75%),
    linear-gradient(-45deg, transparent 75%, #c41e3a 75%);
  background-size: 60px 60px;
  background-position: 0 0, 0 30px, 30px -30px, -30px 0;
}

.border {
  position: absolute;
  inset: 10px;
  border: 5px solid #c41e3a;
  border-radius: 4px;
  opacity: 0.7;
}

.meatball {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #d4956a, #8b4513);
  box-shadow: 0 3px 6px rgba(0,0,0,0.4);
}
.meatball.golden {
  background: radial-gradient(circle at 35% 35%, #fff4a3, #ffd700, #b8860b);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}
.meatball.chili {
  background: radial-gradient(circle at 35% 35%, #ff6b6b, #c41e3a, #8b0000);
  box-shadow: 0 0 12px rgba(196, 30, 58, 0.5);
}

.segment {
  position: absolute;
  border-radius: 50%;
  background: #f5deb3;
  border: 2px solid #c99e6b;
}
.head {
  background: #ffd700;
  border-color: #b8860b;
  z-index: 10;
}
.eye {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  z-index: 11;
}
.pupil {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #000;
  border-radius: 50%;
  z-index: 12;
}

.bot-segment {
  position: absolute;
  border-radius: 50%;
  background: #ff6b6b;
  border: 2px solid #c41e3a;
}
.bot-head {
  background: #ff4444;
  border-color: #8b0000;
  z-index: 8;
}

.bot2-segment {
  position: absolute;
  border-radius: 50%;
  background: #81c784;
  border: 2px solid #4caf50;
}
.bot2-head {
  background: #66bb6a;
  border-color: #388e3c;
  z-index: 8;
}

.rampage-aura {
  position: absolute;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,34,34,0.4) 0%, transparent 70%);
  border: 3px solid rgba(255,85,85,0.8);
  z-index: 5;
}

.title {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 100;
}
.title h1 {
  font-size: 88px;
  color: #ffd700;
  text-shadow:
    0 0 15px rgba(255, 215, 0, 0.5),
    3px 3px 0 #8b0000,
    6px 6px 0 rgba(0,0,0,0.5);
  letter-spacing: -2px;
  line-height: 1;
}
.title .subtitle {
  font-size: 28px;
  color: #ffffff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  margin-top: 12px;
  letter-spacing: 4px;
}

.tagline {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 100;
}
.tagline p {
  font-size: 26px;
  color: #ff6b35;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  letter-spacing: 1px;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
  z-index: 50;
  pointer-events: none;
}

.rampage-border {
  position: absolute;
  inset: 0;
  border: 14px solid rgba(255, 34, 34, 0.35);
  z-index: 45;
}
</style>
</head>
<body>
<div class="cover">
  <div class="checkerboard"></div>
  <div class="border"></div>
  <div class="rampage-border"></div>

  <!-- Meatballs -->
  <div class="meatball" style="width:24px;height:24px;top:380px;left:120px"></div>
  <div class="meatball golden" style="width:28px;height:28px;top:500px;left:620px"></div>
  <div class="meatball" style="width:20px;height:20px;top:900px;left:150px"></div>
  <div class="meatball chili" style="width:24px;height:24px;top:450px;left:400px"></div>
  <div class="meatball" style="width:22px;height:22px;top:1000px;left:600px"></div>
  <div class="meatball golden" style="width:26px;height:26px;top:750px;left:100px"></div>
  <div class="meatball" style="width:18px;height:18px;top:350px;left:650px"></div>

  <!-- Player snake (curving down) -->
  <div class="rampage-aura" style="top:595px;left:365px"></div>
  <div class="segment" style="width:18px;height:18px;top:500px;left:250px"></div>
  <div class="segment" style="width:19px;height:19px;top:515px;left:270px"></div>
  <div class="segment" style="width:20px;height:20px;top:532px;left:292px"></div>
  <div class="segment" style="width:22px;height:22px;top:548px;left:316px"></div>
  <div class="segment" style="width:24px;height:24px;top:562px;left:340px"></div>
  <div class="segment" style="width:26px;height:26px;top:575px;left:365px"></div>
  <div class="segment" style="width:27px;height:27px;top:590px;left:390px"></div>
  <div class="segment head" style="width:34px;height:34px;top:603px;left:414px"></div>
  <div class="eye" style="top:608px;left:438px"></div>
  <div class="eye" style="top:618px;left:438px"></div>
  <div class="pupil" style="top:610px;left:441px"></div>
  <div class="pupil" style="top:620px;left:441px"></div>

  <!-- Bot red -->
  <div class="bot-segment" style="width:16px;height:16px;top:720px;left:500px"></div>
  <div class="bot-segment" style="width:18px;height:18px;top:735px;left:520px"></div>
  <div class="bot-segment" style="width:20px;height:20px;top:748px;left:542px"></div>
  <div class="bot-segment bot-head" style="width:26px;height:26px;top:758px;left:566px"></div>

  <!-- Bot green -->
  <div class="bot2-segment" style="width:14px;height:14px;top:830px;left:200px"></div>
  <div class="bot2-segment" style="width:16px;height:16px;top:840px;left:222px"></div>
  <div class="bot2-segment" style="width:18px;height:18px;top:848px;left:246px"></div>
  <div class="bot2-segment bot2-head" style="width:24px;height:24px;top:852px;left:272px"></div>

  <!-- Title -->
  <div class="title">
    <h1>SPAGHETTI.IO</h1>
    <div class="subtitle">EAT. GROW. DOMINATE.</div>
  </div>

  <div class="tagline">
    <p>Snake-style .io battle</p>
  </div>

  <div class="vignette"></div>
</div>
</body>
</html>
